name: Wettbewerbsdaten aktualisieren

on:
  # Monatlich am 1. um 9:00 Uhr (7 UTC = 9 MESZ)
  schedule:
    - cron: '0 7 1 * *'
  # Manuell per Button oder API auslösbar
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Crawl insurance data
        run: node scripts/crawl.js
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      - name: Commit and push updated data
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen gefunden."
          else
            git commit -m "Wettbewerbsdaten aktualisiert ($(date +%Y-%m-%d))"
            git push
          fi
